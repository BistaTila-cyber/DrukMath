  <style>
    /* Premium Theme Variables */
    :root {
      --primary-crimson: #9B1C31;
      --primary-gold: #D4AF37;
      --accent-forest: #1B4D3E;
      --accent-sky: #22577A;
      
      /* Surface & Layout Colors */
      --bg-app: #F8FAFC;
      --bg-shell: #FFFFFF;
      --bg-card: #FFFFFF;
      --bg-nested: #F1F5F9;
      --text-main: #0F172A;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
      --border-hover: #CBD5E1;
      
      /* Utilities */
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(15, 23, 42, 0.04), 0 4px 6px -4px rgba(15, 23, 42, 0.04);
      --radius-lg: 16px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Reset & Base Styles */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
    body { background-color: var(--bg-app); color: var(--text-main); padding: 40px 20px; min-height: 100vh; display: flex; justify-content: center; align-items: start; }

    /* Shell Container */
    .shell { width: 100%; max-width: 1040px; background: var(--bg-shell); border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: var(--shadow-lg); overflow: hidden; }
    
    /* Top Navigation Bar */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; background: #FFFFFF; border-bottom: 1px solid var(--border-color); }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--primary-crimson), #C42A45); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: #FFFFFF; box-shadow: 0 4px 10px rgba(155, 28, 49, 0.25); }
    .logo-text { font-size: 16px; font-weight: 700; color: var(--text-main); letter-spacing: -0.02em; }
    .logo-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; font-weight: 500; }
    
    /* Portal Selector Tabs */
    .role-tabs { display: flex; gap: 4px; background: var(--bg-nested); border-radius: var(--radius-md); padding: 4px; border: 1px solid var(--border-color); }
    .rtab { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text-muted); display: flex; align-items: center; gap: 6px; transition: var(--transition); }
    .rtab i { font-size: 16px; }
    .rtab:hover { color: var(--text-main); }
    .rtab.active { background: #FFFFFF; color: var(--text-main); box-shadow: var(--shadow-sm); }
    
    /* Portal Views */
    .portal { display: none; padding: 28px; background: #FFFFFF; animation: fadeIn 0.4s ease; }
    .portal.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* Layout Grids */
    .dashboard-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .full-w { grid-column: 1 / -1; }
